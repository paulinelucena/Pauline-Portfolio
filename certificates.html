<style>
:root {
  --bg-void: #03010a; /* Dark violet void */
  --bg-surface: #090317; /* Dark purple surface */
  --bg-card: #110729; /* Deep indigo/purple card */
  --bg-card-hover: #190c3a; /* Deep purple hover state */
  --cyan: #c084fc; /* Purple/Violet Accent */
  --cyan-dim: #9333ea; /* Darker Violet */
  --cyan-glow: rgba(192, 132, 252, 0.15);
  --cyan-glow-strong: rgba(192, 132, 252, 0.28);
  --teal: #e9d5ff; /* Soft lavender / light violet secondary */
  --teal-dim: rgba(233, 213, 255, 0.6);
  --text-primary: #f5f2ff; /* Crisp bright lavender-white */
  --text-secondary: #b5a9df; /* Muted lavender-blue text */
  --text-muted: #6b5a93; /* Shaded purple */
  --border: rgba(192, 132, 252, 0.12);
  --border-bright: rgba(192, 132, 252, 0.35);
  --font-mono: 'JetBrains Mono', monospace;
  --font-display: 'Syne', sans-serif;
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }

body {
  font-family: var(--font-mono);
  background: var(--bg-void);
  color: var(--text-primary);
  overflow-x: hidden;
  line-height: 1.6;
  min-height: 100vh;
}

/* ── AMBIENT BACKGROUND ── */
.ambient-grid {
  position:fixed; inset:0;
  background-image:
    linear-gradient(rgba(192, 132, 252, 0.018) 1px, transparent 1px),
    linear-gradient(90deg, rgba(192, 132, 252, 0.018) 1px, transparent 1px);
  background-size:80px 80px;
  pointer-events:none; z-index:0;
}
#cert-canvas { position:fixed; inset:0; width:100%; height:100%; z-index:0; pointer-events:none; }

/* ── NAV ── */
nav {
  position:fixed; top:0; left:0; right:0; z-index:1000;
  padding:1.2rem 3rem;
  display:flex; justify-content:space-between; align-items:center;
  background:rgba(3,1,10,0.85);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
}
.nav-left { display:flex; align-items:center; gap:1.5rem; }
.back-btn {
  display:flex; align-items:center; gap:0.7rem;
  font-size:0.7rem; letter-spacing:2px; text-transform:uppercase;
  color:var(--text-secondary); border:1px solid var(--border);
  padding:0.55rem 1.2rem; border-radius:4px;
  transition:0.3s; text-decoration: none;
}
.back-btn:hover { color:var(--cyan); border-color:var(--border-bright); transform:translateX(-3px); }
.nav-logo-group { display:flex; align-items:center; gap:0.5rem; }
.nav-logo-svg { width:24px; height:24px; }
.nav-logo { font-family:var(--font-display); font-size:0.95rem; font-weight:800; color:var(--cyan); letter-spacing:2px; }

.wrapper { position:relative; z-index:1; max-width:1300px; margin:0 auto; padding:8rem 2rem 6rem; }

/* ── HERO ── */
.page-hero { margin-bottom:5rem; }
.page-title { font-family:var(--font-display); font-size:clamp(2.2rem, 5vw, 4rem); font-weight:800; color:var(--text-primary); margin-top: 1rem; }
.page-title span { background:linear-gradient(90deg,var(--cyan),var(--teal)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }

/* ── GRID ── */
.cert-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(340px, 1fr)); gap:1.5rem; }
.cert-section { margin-bottom: 3.5rem; }
.cert-section-header {
  display: flex; align-items: center; gap: 1rem;
  margin: 0 0 1.5rem 0;
}
.cert-section-header .sh-bar { flex: 0 0 40px; height: 1px; background: var(--cyan); opacity: 0.6; }
.cert-section-header .sh-line { flex: 1; height: 1px; background: var(--border); }
.cert-section-header .sh-title {
  font-family: var(--font-display);
  font-size: 1.25rem; font-weight: 700;
  color: var(--text-primary); letter-spacing: 1px;
  text-transform: uppercase;
}
.cert-section-header .sh-count {
  font-family: var(--font-mono);
  font-size: 0.65rem; letter-spacing: 2px;
  color: var(--cyan); text-transform: uppercase;
  border: 1px solid var(--border-bright);
  padding: 0.3rem 0.7rem; border-radius: 2px;
}

.cert-card {
  background:var(--bg-card); border:1px solid var(--border); border-radius:4px;
  overflow:hidden; cursor:pointer; position:relative; transition:0.4s var(--ease-out);
}
.cert-card:hover { transform:translateY(-7px); border-color:var(--border-bright); box-shadow:0 20px 40px rgba(0,0,0,0.4), 0 0 25px var(--cyan-glow); }
.img-wrap { position:relative; height:220px; overflow:hidden; background: #000; }
.img-wrap img { width:100%; height:100%; object-fit:cover; opacity:0.75; transition:0.7s; }
.cert-card:hover .img-wrap img { opacity:1; transform:scale(1.05); }
.card-tag { position:absolute; top:12px; left:12px; background:rgba(3,1,10,0.8); color:var(--cyan); font-size:0.6rem; padding:3px 8px; border:1px solid var(--border-bright); z-index: 2; }
.card-footer { padding:1.2rem; display:flex; justify-content:space-between; align-items:center; }
.cert-name { font-family:var(--font-display); font-size:0.85rem; font-weight:700; color:var(--text-primary); margin-bottom: 2px; }
.cert-sub { font-size:0.6rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px; }

/* ── FALLBACK VECTOR DESIGN ── */
.fallback-container {
  display: flex !important; flex-direction: column; justify-content: space-between;
  position: absolute; inset: 0; padding:1.25rem;
  background: linear-gradient(135deg, #110729 0%, #03010a 100%);
  border: 1px dashed rgba(192, 132, 252, 0.25);
  box-shadow: inset 0 0 30px rgba(168, 85, 247, 0.08);
  color: var(--text-primary); text-align: center;
  user-select: none; z-index: 1;
}

/* ── LIGHTBOX DASHBOARD ── */
.lightbox {
  position:fixed; inset:0; z-index:9999;
  display:flex; align-items:center; justify-content:center;
  opacity:0; pointer-events:none; transition:0.4s;
}
.lightbox.open { opacity:1; pointer-events:all; }
.lb-backdrop { position:absolute; inset:0; background:rgba(3,1,10,0.97); backdrop-filter:blur(15px); }

.lb-container {
  position:relative; width:94%; max-width:1150px;
  background: #090317;
  border: 1px solid rgba(192, 132, 252, 0.15);
  border-radius: 8px;
  display: flex; flex-direction: column;
  overflow: hidden;
  box-shadow: 0 50px 100px rgba(0,0,0,0.8), 0 0 50px var(--cyan-glow-strong);
  transform: scale(0.95); transition: 0.4s var(--ease-out);
}
.lightbox.open .lb-container { transform: scale(1); }

.lb-close {
  position:absolute; top:20px; right:20px; z-index:10;
  background:rgba(192, 132, 252, 0.05); border:1px solid rgba(192, 132, 252, 0.15); 
  color:#fff; cursor:pointer; width: 35px; height: 35px; border-radius: 4px;

.cert-frame::before { top: 0; left: 0; border-right: 0; border-bottom: 0; }
.cert-frame::after { bottom: 0; right: 0; border-left: 0; border-top: 0; }

<script>
const certificates = [
  // 1-4: TESDA COURSES
  {

    signatories: ['TESDA Regional Assessment Center']
  },
  // 5-9: COLLEGE WEBINARS & RECOGNITION
  {
    src: 'Ecert 5.png',

  {

    type: 'TESDA Course Certification 6',
    issuer: 'Technical Education and Skills Development Authority (TESDA)',
    date: 'June 7, 2026',
    skills: ['Components of Internal Control System', 'Fundamentals of Internal Control System', 'Checking Internal Control Policy Compliance Report', 'Preparing Policy Compliance Report'],
    signatories: ['TESDA Regional Assessment Center']
  },
  {
    src: 'Ecert 7.png',
    title: 'CYBER SAFE LEARNING FOR EDUCATION PROJECT (CLEP)',
    type: 'Achievement & Recognition',
    issuer: 'DICT, ILCDB, GoPhilippines & Microsoft',
    date: 'September 9, 2022',
    skills: ['Basic Cybersecurity (The "Human Firewall" Training)', 'Data Privacy (Crucial for Corporate Work)', 'Digital Literacy & Secure Collaboration'],
    signatories: ['MARIA LOURDES AQUILIZAN [OIC Director IV/DICT-ILCDB]', 'KARL LEUNG [Chief Partnership and Strategy Officer / Go Philippines]', 'DICT', 'ILCDB', 'GOPHILIPPINES', 'Microsoft']
  },
  {
    src: 'Ecert 8.png',
    title: 'RELENTLESS: OUTLINING THE PARAMETER AND REACH THE POST',
    type: 'Achievement & Recognition',
    issuer: 'University of Caloocan City - BSAIS',
    date: 'January 31, 2021',
    skills: ['Technical accounting competency standards', 'Professional employment strategies.'],
    signatories: ['Remedios R. Santos, CPA, MBA [PICPA NMMC President]', "Jyzzel Ozonia D. Encabo [Regional Council President]"]
  },
  {
    src: 'Ecert 9.png',
    title: 'F.A.C.E (Fight, Aim, Conquer, Excel)',
    type: 'Achievement & Recognition',
    issuer: 'University of Caloocan City - BSAIS',
    date: 'December 4, 2022',
    skills: ['Financial Analyst\'s POV Webinar'],
    signatories: ['BERNADETTE HOLANDA [Guest Speaker]', 'Zenith Camu, CPA, DPA, PhD (Adviser)']
  },
  {
    src: 'QuickBooksOnlineCertification.jpg',
    title: 'QuickBooks Online Accountant Certification',
    type: 'Professional ProAdvisor Certification',
    issuer: 'Intuit QuickBooks',
    date: 'June 10, 2026',
    skills: ['QuickBooks Online Accountant Setup & Navigation', 'Client Management & Books Review', 'Banking, Reconciliation & Transactions', 'Reporting & Financial Statement Preparation', 'Payroll, Sales Tax & Advanced Features'],
    signatories: ['Amanda Newton [GTM Segment Lead, Accountant Channel - Rest of World Portfolio]', 'Intuit QuickBooks']
  }
];

// Category assignment by index:
//   0-5  → TESDA Modules I-VI
//   6    → DICT Webinar (CLEP)
//   7-8  → College Webinars
//   9    → Intuit QuickBooks ProAdvisor
const categoryFor = (idx) => {
  if (idx <= 5) return 'tesda';
  if (idx === 6) return 'dict';
  if (idx === 9) return 'proadvisor';
  return 'college';
};
const categoryLabels = {
  proadvisor: { sub: 'INTUIT PROADVISOR', title: 'Professional ProAdvisor Certification', order: 1 },
  tesda:      { sub: 'TESDA CERTIFIED',   title: 'TESDA Certificate of Completion',                  order: 2 },
  dict:       { sub: 'DICT WEBINAR',      title: 'DICT Webinar',                          order: 3 },
  college:    { sub: 'COLLEGE WEBINAR',   title: 'College Webinars',                      order: 4 },
};

const sectionsRoot = document.getElementById('certSections');
let current = 0;

// Group certificates by category while preserving original indices
const groups = {};
certificates.forEach((cert, idx) => {
  const cat = categoryFor(idx);
  (groups[cat] = groups[cat] || []).push({ cert, idx });
});

// Render sections in defined order
Object.keys(groups)
  .sort((a, b) => categoryLabels[a].order - categoryLabels[b].order)
  .forEach((cat) => {
    const items = groups[cat];
    const section = document.createElement('section');
    section.className = 'cert-section';
    section.innerHTML = `
      <div class="cert-section-header">
        <span class="sh-bar"></span>
        <span class="sh-title">${categoryLabels[cat].title}</span>
        <span class="sh-count">${items.length.toString().padStart(2,'0')} ${items.length === 1 ? 'Credential' : 'Credentials'}</span>
        <span class="sh-line"></span>
      </div>
      <div class="cert-grid"></div>
    `;
    const grid = section.querySelector('.cert-grid');
    items.forEach(({ cert, idx }) => {
      const card = document.createElement('div');
      card.className = 'cert-card';
      card.onclick = () => openLightbox(idx);
      card.innerHTML = `
        <div class="img-wrap" style="position:relative;">
          <img src="${cert.src}" id="img-asset-${idx}" alt="${cert.title}" loading="lazy" onerror="handleMainImgError(${idx})">
          <div class="card-tag">REF-${(idx+1).toString().padStart(2, '0')}</div>
          
          <!-- Embedded Fallback Vector (Hidden by default unless src fails to load) -->
          <div class="fallback-container cert-style-${categoryFor(idx)}" id="fallback-card-${idx}" style="display:none;">
            <div class="fb-header">
              <span>DIGITAL RECORD</span>
              <span><i class="fas fa-shield-alt"></i> VERIFIED</span>
            </div>
            
            <div class="fb-seal">
              <i class="fas fa-award"></i>
            </div>
            
            <div style="margin: 0.3rem 0;">
              <div class="fb-recipient">Presented to:</div>
              <div class="fb-name">Pauline Lucena</div>
            </div>
            
            <div class="fb-title">${cert.title}</div>
            
            <div class="fb-footer">
              <div>
                <label style="display:block; font-size: 0.4rem; color: var(--text-muted); text-transform:uppercase;">AUTHORITY:</label>
                <span style="font-size:0.55rem; font-weight:600; color:var(--text-secondary); max-width:140px; display:inline-block; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${cert.issuer}</span>
              </div>
              <div style="text-align:right;">
                <label style="display:block; font-size: 0.4rem; color: var(--text-muted); text-transform:uppercase;">DATE ISSUED:</label>
                <span style="font-size:0.55rem; font-weight:600; color:var(--text-secondary);">${cert.date}</span>
              </div>
            </div>
          </div>
        </div>
        <div class="card-footer">
          <div>
            <div class="cert-name">${cert.title}</div>
            <div class="cert-sub">${categoryLabels[cat].sub}</div>
          </div>
          <div style="color:var(--cyan); font-size:0.8rem;"><i class="fas fa-plus"></i></div>
        </div>
      `;
      grid.appendChild(card);
    });
    sectionsRoot.appendChild(section);
  });

function handleMainImgError(idx) {
  const imgEl = document.getElementById(`img-asset-${idx}`);
  const fallbackEl = document.getElementById(`fallback-card-${idx}`);
  if (imgEl && fallbackEl) {
    imgEl.style.display = 'none';
    fallbackEl.style.display = 'flex';
  }
}

function openLightbox(index) {
  current = index;
  updateLightbox();
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}

function navigateLightbox(dir) {
  current = (current + dir + certificates.length) % certificates.length;
  updateLightbox();
}

function updateLightbox() {
  const cert = certificates[current];
  const imgEl = document.getElementById('lbImg');
  
  // Reset fallback state
  imgEl.style.display = 'block';
  const existingFb = document.getElementById('lbFallback');
  if (existingFb) {
    existingFb.remove();
  }

  imgEl.src = cert.src;
  document.getElementById('lbTitle').textContent = cert.title;
  document.getElementById('lbType').textContent = cert.type;
  document.getElementById('lbIssuer').textContent = cert.issuer;
  document.getElementById('lbDate').textContent = cert.date;
  document.getElementById('lbBottomTitle').textContent = cert.title;
  document.getElementById('lbBottomTag').textContent = `INDEX ${(current+1).toString().padStart(2, '0')}`;
  document.getElementById('lbCounter').textContent = `${current + 1} / ${certificates.length}`;

  const skillContainer = document.getElementById('lbSkills');
  skillContainer.innerHTML = '';
  cert.skills.forEach(s => {
    const span = document.createElement('span');
    span.className = 'skill-tag';
    span.textContent = s;
    skillContainer.appendChild(span);
  });

  const signContainer = document.getElementById('lbSignatories');
  signContainer.innerHTML = '';
  cert.signatories.forEach(s => {
    const span = document.createElement('span');
    span.className = 'sign-item';
    span.textContent = s;
    signContainer.appendChild(span);
  });
}

function handleLbImgLoad() {
  // Done loading, ensure visible
  document.getElementById('lbImg').style.display = 'block';
}

function handleLbImgError() {
  const imgEl = document.getElementById('lbImg');
  const frameEl = document.getElementById('lbFrame');
  imgEl.style.display = 'none';
  
  // Check if already has fallback to prevent duplicate creation
  if (document.getElementById('lbFallback')) return;
  
  const cert = certificates[current];
  const div = document.createElement('div');
  div.id = 'lbFallback';
  const cat = categoryFor(current);
  div.className = `lb-fallback-container lb-style-${cat}`;
  div.innerHTML = `
    <div class="lb-fb-header">
      <span>SECURE LEDGER RECORD</span>
      <span><i class="fas fa-shield-alt"></i> AUTHENTICATED</span>
    </div>
    
    <div class="lb-fb-seal">
      <i class="fas fa-award"></i>
    </div>
    
    <div style="margin: 1rem 0;">
      <div class="lb-fb-recipient">This digital record confirms that</div>
      <div class="lb-fb-name">Pauline Lucena</div>
      <div class="lb-fb-recipient" style="margin-top:0.4rem;">has successfully completed and qualified in:</div>
    </div>
    
    <div class="lb-fb-title">${cert.title}</div>
    
    <div class="lb-fb-footer">
      <div>
        <label style="display:block; font-size: 0.5rem; color: var(--text-muted); text-transform:uppercase; letter-spacing:1px; margin-bottom: 2px;">ISSUING ORGANIZATION:</label>
        <span style="font-size:0.75rem; font-weight:600; color:var(--text-secondary);">${cert.issuer}</span>
      </div>
      <div style="text-align:right;">
        <label style="display:block; font-size: 0.5rem; color: var(--text-muted); text-transform:uppercase; letter-spacing:1px; margin-bottom: 2px;">DATE CONFERRED:</label>
        <span style="font-size:0.75rem; font-weight:600; color:var(--text-secondary);">${cert.date}</span>
      </div>
    </div>
  `;
  frameEl.appendChild(div);
}

// Particle Background Fix
const canvas = document.getElementById('cert-canvas');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

const particles = Array.from({ length: 45 }, () => ({
  x: Math.random(),
  y: Math.random()
}));

const symbols = [
  '$', '₱', 'Σ', '%', '+', '-', '＝', 'DR', 'CR', 
  '0.00', '1040', 'Balance', 'Tax', 'ROI', 'Ledger', 
  'Audit', 'Equity', 'Assets', 'Profit', 'Debit', 'Credit'
];

const richParticles = particles.map(p => ({
  ...p,
  text: symbols[Math.floor(Math.random() * symbols.length)],
  size: Math.random() * 12 + 10,
  speed: Math.random() * 0.4 + 0.1,
  opacity: Math.random() * 0.12 + 0.04,
  rotation: (Math.random() - 0.5) * 0.3,
  rotSpeed: (Math.random() - 0.5) * 0.005
}));

function loop() {
  ctx.clearRect(0,0,W,H);
  
  // Faint bookkeeping ledger lines in the background
  ctx.strokeStyle = 'rgba(192, 132, 252, 0.02)';
  ctx.lineWidth = 1;
  for (let x = 100; x < W; x += 250) {
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, H);
    ctx.stroke();
  }
  for (let y = 80; y < H; y += 120) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(W, y);
    ctx.stroke();
  }

  richParticles.forEach(p => {
    ctx.save();
    ctx.translate(p.x * W, p.y * H);
    ctx.rotate(p.rotation);
    ctx.font = `600 ${p.size}px 'JetBrains Mono', monospace`;
    ctx.fillStyle = `rgba(192, 132, 252, ${p.opacity})`;
    ctx.fillText(p.text, -ctx.measureText(p.text).width / 2, p.size / 2);
    ctx.restore();

    p.y -= (p.speed / H) * 20;
    p.rotation += p.rotSpeed;
    if (p.y < -0.05) {
      p.y = 1.05;
      p.x = Math.random();
    }
  });

  requestAnimationFrame(loop);
}
loop();

// Close on escape, left/right navigate
document.addEventListener('keydown', e => {
  const lightbox = document.getElementById('lightbox');
  if (!lightbox.classList.contains('open')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') navigateLightbox(-1);
  if (e.key === 'ArrowRight') navigateLightbox(1);
});
</script>
